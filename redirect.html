<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="4; url=https://sehgalaaryan.github.io" />

    <style>
        /* Base styling and centering */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0f;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f8f9fa;
        }

        /* Elegant spinning animation */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Typography */
        p {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        /* Fallback link styling */
        a {
            font-size: 0.9rem;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="spinner" role="status" aria-label="Loading"></div>
    <p aria-live="polite">Loading...</p>
    <a href="https://sehgalaaryan.github.io">Click here if it takes any longer</a>
</body>

</html>
